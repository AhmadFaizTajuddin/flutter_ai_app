name: flutter_ai_edge
description: Flutter AI Edge Computing App with Claude AI integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  flutter_markdown: ^0.6.18
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  
  # Icons
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
